# Defines the unique identifier for the application within the Spring context
spring.application.name=vehicle-rental-system

# Sets the local port for the embedded web server
server.port=8080

# POSTGRESQL DATABASE CONFIGURATION
# Specifies the connection string, credentials, and driver for the PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5432/vehicle_rental_system_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HIBERNATE / JPA SETTINGS
# Ensures the database schema matches the entity definitions without modifying data
spring.jpa.hibernate.ddl-auto=validate
# Enables logging of SQL queries to the console for debugging and performance monitoring
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DEFAULT SECURITY CREDENTIALS
spring.security.user.name=admin
spring.security.user.password=admin

# JWT SECURITY CONFIGURATION
# Provides the 256-bit key used to cryptographically sign and verify authentication tokens
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Sets the token validity period to 24 hours (expressed in milliseconds)
jwt.expiration=86400000

# Configures the JSON mapper to handle enum values regardless of letter casing
spring.jackson.mapper.accept-case-insensitive-enums=true