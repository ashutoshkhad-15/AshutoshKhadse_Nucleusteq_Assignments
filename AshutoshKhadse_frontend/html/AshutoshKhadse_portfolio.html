<!DOCTYPE html>
<html lang="en">

<head>
    <!-- I used charset so special characters render properly -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashutosh Khadse | Portfolio</title>
</head>

<body>

    <!-- My HEADER Section: will hold name, title, and profile image -->
    <header>
        <h1>Ashutosh Khadse</h1>
        <h2>Data Engineer</h2>
        <!-- Also added the alternative text as it is mandatory for accessibility — describes the image if it fails to load -->
        <img src="ashutosh-headshot.png" alt="Profile photo of Ashutosh Khadse" width="120" height="120" />
    </header>

    <hr>

    <!-- The NAVIGATION Section: will have internal links to jump to each section -->
    <nav>
        <!-- Unordered list because nav items have no specific ranking -->
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a>

                <!-- Nested list to show sub-sections under Skills -->
                <ul>
                    <li><a href="#technical-skills">Technical Skills</a></li>
                    <li><a href="#soft-skills">Soft Skills</a></li>
                </ul>

            </li>

            <li><a href="#education">Education</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

    </nav>

    <hr>

    <main>
        <!-- This is the main content area where all sections will be placed -->

        <!-- ABOUT Section: professional summary with text formatting -->
        <section id="about">
            <h2>About Me</h2>
            <!-- paragraph with strong and em tags goes here -->
        </section>

        <hr>

        <!-- SKILLS Section: nested unordered lists, varied bullet types -->
        <section id="skills">
            <h2>Skills</h2>
            <!-- technical and soft skill lists go here -->
        </section>

        <hr>

        <!-- EDUCATION Section: table with colspan -->
        <section id="education">
            <h2>Education</h2>
            <!-- table with degree, institution, year, grade goes here -->
        </section>

        <hr>

        <!-- PROJECTS Section: ordered list with article tags -->
        <section id="projects">
            <h2>Projects</h2>
            <!-- ol with 2 projects goes here -->
        </section>

        <hr>

        <!-- CONTACT Section: full form with input, select, radio, checkbox -->
        <section id="contact">
            <h2>Contact Me</h2>
            <!-- form fields go here -->
        </section>

    </main>

    <hr>

    <!-- FOOTER Section: copyright and external link -->
    <footer>
        <!-- copyright and LinkedIn/GitHub link goes here -->
    </footer>

</body>

</html>
