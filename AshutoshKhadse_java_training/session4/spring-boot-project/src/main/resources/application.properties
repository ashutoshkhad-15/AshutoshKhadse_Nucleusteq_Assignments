spring.application.name=spring-boot-project
# 1. Database Connection Settings
spring.datasource.url=jdbc:h2:mem:tododb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 2. JPA / Hibernate Settings
# This tells Hibernate to create/update tables based on your Entity classes automatically
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. H2 Console Settings
# This allows you to visit http://localhost:8080/h2-console to see your data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 4. Server Port (Optional, defaults to 8080)
server.port=8080